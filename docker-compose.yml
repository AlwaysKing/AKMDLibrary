services:
  akmdlibrary:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./docs:/app/docs
      - ./data:/app/data
    environment:
      - PORT=8080
      - DOCS_DIR=/app/docs
      - DATA_DIR=/app/data
      - FRONTEND_DIST=/app/frontend/dist
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    restart: unless-stopped
